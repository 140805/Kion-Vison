<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagem enviada | Kion Vision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#081120;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

/* ===== PARTICLES ===== */
#tsparticles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* ===== BOX ===== */
.thanks-box{
  max-width:600px;
  padding:60px;
  background:#111827;
  border-radius:30px;
  border:1px solid #1f2937;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  animation: fadeUp 1s ease;
  position:relative;
  z-index:2;
}

.icon{
  font-size:70px;
  color:#38bdf8;
  margin-bottom:20px;
}

h1{
  font-size:42px;
  margin-bottom:15px;
}

p{
  color:#94a3b8;
  line-height:1.6;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:15px 25px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  text-decoration:none;
}

.btn-primary{
  background:#38bdf8;
  color:#081120;
}

.btn-dark{
  background:#1e293b;
  color:white;
}

.btn:hover{
  transform:translateY(-5px);
}

.whatsapp{
  background:#25d366;
  color:white;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>

</head>

<body>

<!-- PARTICLES BACKGROUND -->
<div id="tsparticles"></div>

<!-- SUCCESS BOX -->
<div class="thanks-box">

  <div class="icon">
    <i class="fas fa-check-circle"></i>
  </div>

  <h1>Mensagem enviada!</h1>

  <p>
    Recebemos seu contato com sucesso.<br>
    Em breve retornaremos para você 👍
  </p>

  <div class="buttons">

    <a href="index.html" class="btn btn-primary">
      Voltar ao site
    </a>

    <a href="https://wa.me/5547996663842?text=Olá! Vim pelo site da Kion Vision e gostaria de falar sobre meu projeto."
       target="_blank"
       class="btn whatsapp">
      Falar no WhatsApp
    </a>

  </div>

</div>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("tsparticles", {
  background: {
    color: "#081120"
  },
  particles: {
    number: { value: 60 },
    color: { value: "#38bdf8" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: { min: 1, max: 4 } },
    move: {
      enable: true,
      speed: 1.2,
      outModes: "out"
    },
    links: {
      enable: true,
      color: "#38bdf8",
      distance: 140,
      opacity: 0.3
    }
  }
});
</script>

</body>
</html>
